services:

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: metalmind-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./instance:/app/instance
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  instance_data:
