services:

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: metalmind-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - FLASK_ENV=development
      - FLASK_APP=api/app/main.py
    volumes:
      - ./:/app                     # mount full project for hot reload
      - /app/__pycache__            # prevent cache conflicts
      - /app/.pytest_cache
    # Clear the image ENTRYPOINT (the host mount hides the file copied into the image)
    entrypoint: []
    # Use sh -c to run migrations then start the socketio-backed server
    command: >
      sh -c "
        cd /app && \
        flask db upgrade 2>/dev/null || true && \
        python start_api.py
      "
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: metalmind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-metalmind}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: metalmind-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_URL=http://api:5000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    volumes:
      - ./frontend-next:/app        # hot reload: code changes reflect instantly
      - /app/node_modules           # prevents conflicts with local node_modules
      - next_cache:/app/.next       # use named volume for .next cache to avoid permission issues
    command: npm run dev
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  etl:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: metalmind-etl
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./:/app
      - /app/__pycache__
    entrypoint: []
    command: >
      sh -c "
        cd /app && \
        python run_pipeline.py --mode schedule
      "
    working_dir: /app
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  instance_data:
  db_data:
  next_cache:
