name: MetalMind Pipeline

on:
  schedule:
    - cron: '0 3 * * *'  # Daily retrain only
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metalmind-pipeline
  cancel-in-progress: false

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Note about MT5
        run: |
          echo "Note: Data updates require MT5 running locally."
          echo "GitHub Actions only handles model retraining."
          echo "Run 'python scripts/mt5_update.py' locally to update data."

      - name: Check data freshness
        run: python run_pipeline.py --mode freshness

      - name: Retrain gold model
        run: python run_pipeline.py --mode retrain --asset gold --trials 10

      - name: Retrain silver model
        run: python run_pipeline.py --mode retrain --asset silver --trials 10

      - name: Commit and push updated models
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add models/ reports/training_logs/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "model: daily retrain $(date +'%Y-%m-%d')"
          git push origin main
