name: MetalMind Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metalmind-pipeline
  cancel-in-progress: false

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Retrain gold model
        run: python -c "
          from models.train_enhanced import EnhancedModelTrainer;
          t = EnhancedModelTrainer(primary_tf='15m', asset='gold');
          t.run_complete_pipeline(n_trials=10)
        "

      - name: Retrain silver model
        run: python -c "
          from models.train_enhanced import EnhancedModelTrainer;
          t = EnhancedModelTrainer(primary_tf='15m', asset='silver');
          t.run_complete_pipeline(n_trials=10)
        "

      - name: Commit and push updated models
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add models/ reports/training_logs/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "model: daily retrain $(date +'%Y-%m-%d')"
          git push origin main
