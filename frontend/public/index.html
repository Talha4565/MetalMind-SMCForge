<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="ML Signals Dashboard - XAU/USD Trading Signals" />
    <!-- Aggressive cache prevention -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ML Signals Dashboard v2.0</title>
    <script>
      // Force clear old cache on load
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
      // Clear localStorage if it has old auth token
      if (localStorage.getItem('token') && !localStorage.getItem('token').startsWith('eyJ')) {
        console.log('Clearing invalid token');
        localStorage.clear();
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
