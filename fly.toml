# MetalMind SMCForge — Fly.io deployment
# Run: fly launch (first time), then: fly deploy

app = "metalmind-api"
primary_region = "iad"

[build]
  dockerfile = "api/Dockerfile"

[env]
  FLASK_ENV = "production"
  PYTHONPATH = "/app"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
